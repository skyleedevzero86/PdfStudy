name: "버그 리포트"
description: "버그 발생 시 작성하는 리포트 템플릿입니다."
title: "[버그] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트에 감사드립니다! 가능한 한 자세히 작성해 주세요.

  - type: textarea
    id: summary
    attributes:
      label: 현상 요약
      description: 무엇이 잘못되었는지 간단히 설명해 주세요.
      placeholder: 예) 문서 검색 시 500 에러가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제가 재현되는 구체적인 순서를 적어 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 한다고 생각하셨는지 적어 주세요.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 환경 정보
      description: OS, Java/Kotlin 버전 등 환경 정보를 적어 주세요.
      placeholder: |
        - OS:
        - Java/Kotlin:
        - 기타:
    validations:
      required: false

